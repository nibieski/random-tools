<!DOCTYPE html>
<html>
    <head>
        <title>random tools</title>
        <style>
                body {
                    background-color: rgb(20, 20, 20);
                    font-family: sans-serif;
                    color: white;
                }
                .darkButton {
                    background-color: rgb(58, 58, 58);
                    font-size: 20px;
                    color: white;
                    display: block;
                    border-radius: 24px;
                    border-style: none;
                    corner-shape: squircle;
                    transition: background-color 0.1s ease-in-out;
                }
                .darkButton:hover { 
                background-color: rgb(90, 90, 90);
                }
                .headingButton {
                    font-size: 32px;
                    font-weight: bold;
                    color: white;
                    background: transparent;
                    border: none;
                    padding: 0;
                }
                </style>
        </style>
    </head>
    <body>  
        <button class="headingButton" onclick="window.location.href='index.html'">random tools</button>
        <p>Portal calculator</p>
        <strong>input coordinates and method here</strong>
        <br>
        <br>
        <input class="darkButton" style="height: 25px; "placeholder="X", id="xCoord">
        <br>
        <input class="darkButton" style="height: 25px;"placeholder="Z", id="zCoord">
        <br>
        <select class="darkButton" style="height: 25px; width: 210px;" id="method">
            <option value="overworldToNe">overworld to nether</option>
            <option value="NetherToOv">nether to overworld</option>
        </select>
        <br>
        <button id="calculate", class="darkButton", style="height: 30px; width: fit-content;">calculate</button>
        <br>
        <strong>output here:</strong>
        <p id="output"></p>

        <script>
            document.getElementById('calculate').addEventListener('click', () =>{
                const x = document.getElementById('xCoord').value;
                const z = document.getElementById('zCoord').value;
                const output = document.getElementById('output');
                if (x !== "" && z !=="" && !isNaN(x) && !isNaN(z)) {
                    if (document.getElementById('method').value == "overworldToNe") {
                        output.textContent = `X: ${Math.floor(x/8)} Z: ${Math.floor(z/8)}`;
                    } else {
                        output.textContent = `X: ${x*8} Z: ${z*8}`;
                    }
                } else {
                    output.textContent = "choose a number :)";
                }
            });

        </script>
    </body>
</html>
